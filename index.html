<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Explorer</title>

    <!-- Bootstrap CSS -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    
    <div class="container py-4 app-wrapper">
      <h2 class="text-center mb-2 fw-bold">Recipe explorer</h2>
      <p class="text-center text-muted mb-4">
        Search for your favorite dishes.
      </p>
      <!-- search bar -->
      <div class="input-group mb-3">
        <input
          id="searchInput"
          type="text"
          class="form-control"
          placeholder="Type a dish name, e.g.,salad,cake..."
        />
        <button id="searchBtn" class="btn btn-primary">Search</button>
      </div>
      <!-- status message -->
      <p id="message" class="text-center text-muted mb-3"></p>
      <!-- category filter bar -->
    <div id="categoryBar" class="mb-3 text-center">
    <!-- buttons will be added here by JavaScript -->
    </div>
      <!-- results row -->
      <div id="results" class="row g-4 justify-content-center">
        <!-- cards will go here -->
      </div>
    </div>

    <!-- REMOVE aria-hidden entirely from the initial HTML -->
<div class="modal fade" id="recipeModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Recipe Details</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="modalBody">
            <!-- filled byjavascript -->

          </div>
        </div>
      </div>
    </div>
    <!-- app script -->
    <script src="script.js"></script>
  </body>
</html>
